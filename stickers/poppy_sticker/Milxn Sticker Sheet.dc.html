<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@1,800&display=swap" rel="stylesheet">
  <style>
    @page { size: letter; margin: 0; }
    @media print {
      .no-print { display: none !important; }
      html, body { margin: 0 !important; padding: 0 !important; background: #fff !important; }
      #sheet-wrap { padding: 0 !important; }
    }
    body { margin: 0; background: #e7e4dd; }
    a { color: #141414; }
    a:hover { color: #444; }
  </style>
</helmet>

<div style="min-height: 100vh; font-family: Georgia, 'Times New Roman', serif;">

  <div class="no-print" style="display:flex; align-items:center; justify-content:center; gap:24px; padding:20px 16px; background:#141414; color:#f4f1ea; flex-wrap:wrap;">
    <div style="font-size:13px; letter-spacing:1px; text-transform:uppercase; opacity:0.7;">milxn sticker sheet</div>

    <div style="display:flex; gap:8px; align-items:center;">
      <span style="font-size:11px; letter-spacing:1px; text-transform:uppercase; opacity:0.6;">Flower</span>
      <button style="padding:6px 12px; border:1px solid #f4f1ea; background:{{ daisyBtnBg }}; color:{{ daisyBtnColor }}; font-size:12px; cursor:pointer; letter-spacing:0.5px;" onClick="{{ setVariantDaisy }}">Daisy</button>
      <button style="padding:6px 12px; border:1px solid #f4f1ea; background:{{ tulipBtnBg }}; color:{{ tulipBtnColor }}; font-size:12px; cursor:pointer; letter-spacing:0.5px;" onClick="{{ setVariantTulip }}">Tulip</button>
    </div>

    <div style="display:flex; gap:8px; align-items:center;">
      <span style="font-size:11px; letter-spacing:1px; text-transform:uppercase; opacity:0.6;">Box</span>
      <button style="width:22px; height:22px; border-radius:50%; border:2px solid {{ swatchBorderBlack }}; background:#141414; cursor:pointer;" onClick="{{ setBoxBlack }}"></button>
      <button style="width:22px; height:22px; border-radius:50%; border:2px solid {{ swatchBorderGreen }}; background:#1f3d2b; cursor:pointer;" onClick="{{ setBoxGreen }}"></button>
      <button style="width:22px; height:22px; border-radius:50%; border:2px solid {{ swatchBorderCream }}; background:#ece4d3; cursor:pointer;" onClick="{{ setBoxCream }}"></button>
      <button style="width:22px; height:22px; border-radius:50%; border:2px solid {{ swatchBorderRust }}; background:#a8452b; cursor:pointer;" onClick="{{ setBoxRust }}"></button>
      <button style="width:22px; height:22px; border-radius:50%; border:2px solid {{ swatchBorderRed }}; background:#ed1c24; cursor:pointer;" onClick="{{ setBoxRed }}"></button>
    </div>

    <div style="font-size:11px; opacity:0.55; max-width:220px; line-height:1.4;">Sheet prints on US Letter — use Save as PDF / Cmd+P to print.</div>
  </div>

  <div id="sheet-wrap" style="display:flex; justify-content:center; padding:32px 16px;">
    <div style="width:8.5in; height:11in; background:#fff; box-shadow:0 4px 24px rgba(0,0,0,0.15); display:grid; grid-template-columns:repeat(3, 2.3in); grid-template-rows:repeat(3, 3.1in); gap:0.2in; justify-content:center; align-content:center;">

      <sc-for list="{{ cards }}" as="card" hint-placeholder-count="9">
        <div style="width:2.3in; height:3.1in; box-sizing:border-box; background:#ffffff; border:1px solid #141414; border-radius:2px; position:relative; padding:10px; display:flex; flex-direction:column; align-items:center; overflow:hidden;">

          <div style="flex:1; display:flex; align-items:center; justify-content:center; width:100%; margin-top:10px;">
            <sc-if value="{{ isDaisy }}" hint-placeholder-val="{{ true }}">
              <svg width="108" height="140" viewBox="0 0 120 160" fill="none">
                <path d="M60 150 L60 74" stroke="#141414" stroke-width="2" stroke-linecap="round"/>
                <path d="M60 122 C 46 120, 32 110, 24 96 C 36 98, 48 104, 60 114 Z" fill="#3f6b3a" stroke="#141414" stroke-width="1"/>
                <path d="M60 110 C 74 106, 86 96, 94 84 C 82 88, 70 96, 60 102 Z" fill="#3f6b3a" stroke="#141414" stroke-width="1"/>
                <g transform="translate(60 42)">
                  <g fill="#f7f4ec" stroke="#141414" stroke-width="1.2">
                    <ellipse cx="0" cy="-24" rx="7" ry="16"/>
                    <ellipse cx="0" cy="24" rx="7" ry="16"/>
                    <ellipse cx="24" cy="0" rx="16" ry="7"/>
                    <ellipse cx="-24" cy="0" rx="16" ry="7"/>
                    <ellipse cx="17" cy="-17" rx="16" ry="7" transform="rotate(45 17 -17)"/>
                    <ellipse cx="-17" cy="17" rx="16" ry="7" transform="rotate(45 -17 17)"/>
                    <ellipse cx="17" cy="17" rx="16" ry="7" transform="rotate(-45 17 17)"/>
                    <ellipse cx="-17" cy="-17" rx="16" ry="7" transform="rotate(-45 -17 -17)"/>
                  </g>
                  <circle cx="0" cy="0" r="11" fill="#f2c94c" stroke="#141414" stroke-width="1.5"/>
                </g>
              </svg>
            </sc-if>
            <sc-if value="{{ isTulip }}" hint-placeholder-val="{{ false }}">
              <svg width="108" height="140" viewBox="0 0 120 160" fill="none">
                <path d="M60 150 L60 70" stroke="#141414" stroke-width="2" stroke-linecap="round"/>
                <path d="M60 118 C 44 116, 28 106, 20 90 C 32 92, 46 98, 60 110 Z" fill="#3f6b3a" stroke="#141414" stroke-width="1"/>
                <path d="M60 106 C 76 102, 90 92, 98 78 C 86 82, 72 90, 60 98 Z" fill="#3f6b3a" stroke="#141414" stroke-width="1"/>
                <g transform="translate(60 44)">
                  <path d="M0 30 C -22 22, -26 -4, -18 -26 C -12 -12, -6 6, 0 30 Z" fill="#d6668f" stroke="#141414" stroke-width="1.4"/>
                  <path d="M0 30 C 22 22, 26 -4, 18 -26 C 12 -12, 6 6, 0 30 Z" fill="#d6668f" stroke="#141414" stroke-width="1.4"/>
                  <path d="M0 30 C -10 10, -6 -18, 0 -32 C 6 -18, 10 10, 0 30 Z" fill="#e2839e" stroke="#141414" stroke-width="1.4"/>
                </g>
              </svg>
            </sc-if>
          </div>

          <div style="font-size:15px; letter-spacing:3px; text-transform:uppercase; color:#141414; margin-top:2px;">{{ flowerName }}</div>

          <div style="margin-top:8px;"></div>

          <div style="background:{{ boxColor }}; padding:6px 18px 5px; border-radius:2px;">
            <div style="font-family:'Poppins', Arial, sans-serif; font-weight:800; font-style:italic; font-size:18px; letter-spacing:-0.3px; color:{{ boxTextColor }};">{{ brandText }}</div>
          </div>

        </div>
      </sc-for>

    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 900, &quot;height&quot;: 1100}, &quot;variant&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;daisy&quot;, &quot;options&quot;: [&quot;daisy&quot;, &quot;tulip&quot;], &quot;tsType&quot;: &quot;string&quot;}, &quot;boxColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#ed1c24&quot;, &quot;options&quot;: [&quot;#ed1c24&quot;, &quot;#141414&quot;, &quot;#1f3d2b&quot;, &quot;#ece4d3&quot;, &quot;#a8452b&quot;], &quot;tsType&quot;: &quot;string&quot;}, &quot;brandText&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;milxn&quot;, &quot;tsType&quot;: &quot;string&quot;}}">
class Component extends DCLogic {
  state = {
    variant: this.props.variant || 'daisy',
    boxColor: this.props.boxColor || '#ed1c24'
  };

  setVariant(v) { this.setState({ variant: v }); }
  setBox(c) { this.setState({ boxColor: c }); }

  renderVals() {
    const variant = this.state.variant;
    const boxColor = this.state.boxColor;
    const brandText = this.props.brandText || 'milxn';

    const content = {
      daisy: { name: 'Daisy', latin: 'Bellis perennis', tag: 'BELLIS' },
      tulip: { name: 'Tulip', latin: 'Tulipa gesneriana', tag: 'TULIPA' }
    }[variant];

    const textColor = boxColor === '#ece4d3' ? '#141414' : '#f4f1ea';

    const cards = [];
    for (let i = 1; i <= 9; i++) {
      cards.push({ n: i, label: 'NO. 0' + i });
    }

    const activeBtn = { bg: '#f4f1ea', color: '#141414' };
    const idleBtn = { bg: 'transparent', color: '#f4f1ea' };

    return {
      cards,
      isDaisy: variant === 'daisy',
      isTulip: variant === 'tulip',
      flowerName: content.name,
      flowerLatin: content.latin,
      cornerTag: content.tag,
      brandLabel: brandText.toUpperCase() + ' CO.',
      brandText: brandText,
      boxColor: boxColor,
      boxTextColor: textColor,

      daisyBtnBg: variant === 'daisy' ? activeBtn.bg : idleBtn.bg,
      daisyBtnColor: variant === 'daisy' ? activeBtn.color : idleBtn.color,
      tulipBtnBg: variant === 'tulip' ? activeBtn.bg : idleBtn.bg,
      tulipBtnColor: variant === 'tulip' ? activeBtn.color : idleBtn.color,

      swatchBorderBlack: boxColor === '#141414' ? '#ed1c24' : '#f4f1ea',
      swatchBorderGreen: boxColor === '#1f3d2b' ? '#ed1c24' : '#f4f1ea',
      swatchBorderCream: boxColor === '#ece4d3' ? '#ed1c24' : '#f4f1ea',
      swatchBorderRust: boxColor === '#a8452b' ? '#ed1c24' : '#f4f1ea',
      swatchBorderRed: boxColor === '#ed1c24' ? '#f4f1ea' : '#ed1c24',

      setVariantDaisy: () => this.setVariant('daisy'),
      setVariantTulip: () => this.setVariant('tulip'),
      setBoxBlack: () => this.setBox('#141414'),
      setBoxGreen: () => this.setBox('#1f3d2b'),
      setBoxCream: () => this.setBox('#ece4d3'),
      setBoxRust: () => this.setBox('#a8452b'),
      setBoxRed: () => this.setBox('#ed1c24')
    };
  }
}
</script>
</body>
</html>
