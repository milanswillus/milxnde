<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cherry chess</title>
<meta name="description" content="Cherry Chess — a clean, fully offline chess app for iPhone. Play, train openings, practice checkmates, learn the board.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,700&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
  body { margin:0; background:#000; color:#fff; font-family:'Courier Prime','Courier New',monospace; }
  a { color:inherit; text-decoration:none; }
  a:hover { color:#e8221f; }
  .wrap { min-height:100vh; display:flex; justify-content:center; padding:12vh 15px 70px; box-sizing:border-box; }
  .col { width:100%; max-width:440px; text-align:center; }
  .logo { background:#e8221f; border-radius:4px; padding:10px 26px; display:inline-block; box-shadow:0 8px 24px rgba(232,34,31,0.25); margin-bottom:12px; }
  .logo span { color:#fff; font-family:'Archivo Black','Arial Black',sans-serif; font-size:34px; font-weight:900; font-style:italic; letter-spacing:-0.03em; line-height:1; text-transform:lowercase; }
  h1 { font-size:26px; font-weight:700; text-transform:lowercase; letter-spacing:-0.5px; margin:70px 0 10px; }
  .cherry { font-size:44px; line-height:1; display:block; margin-bottom:14px; }
  .tag { font-size:14px; opacity:0.85; margin:0 0 50px; }
  ul.features { list-style:none; padding:0; margin:0 auto 60px; max-width:300px; text-align:left; font-size:14px; line-height:2.1; text-transform:lowercase; }
  ul.features li::before { content:"— "; color:#e8221f; font-weight:700; }
  .links { font-size:13px; text-transform:lowercase; }
  .links a { font-weight:700; margin:0 10px; }
  footer { margin-top:80px; font-size:11px; opacity:0.5; text-transform:lowercase; }
</style>
</head>
<body>
<div class="wrap">
  <div class="col">
    <header>
      <a href="https://milxn.de" class="logo"><span>milxn</span></a>
    </header>

    <h1><span class="cherry">🍒</span>cherry chess</h1>
    <p class="tag">a clean, fully offline chess app for iPhone.</p>

    <ul class="features">
      <li>play against the engine</li>
      <li>train your openings</li>
      <li>practice checkmate patterns</li>
      <li>learn board coordinates</li>
      <li>review your game history</li>
      <li>no account, no ads, no tracking</li>
    </ul>

    <nav class="links">
      <a href="/cherrychess/support/">support</a>
      <a href="/cherrychess/privacy/">privacy</a>
    </nav>

    <footer>&copy; 2026 milan swillus</footer>
  </div>
</div>
</body>
</html>
