<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,700&family=Archivo+Black&display=swap" rel="stylesheet">
  <style>
    @keyframes floatLogo { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes logoPress {
      0% { transform: scale(1) rotateY(0deg) rotateX(0deg); }
      28% { transform: scale(0.82) rotateY(-30deg) rotateX(14deg); }
      58% { transform: scale(1.18) rotateY(22deg) rotateX(-10deg); }
      80% { transform: scale(0.96) rotateY(-8deg) rotateX(4deg); }
      100% { transform: scale(1) rotateY(0deg) rotateX(0deg); }
    }
    @keyframes logoPress3D {
      0% { transform: translateY(0) rotateY(0deg) scale(1); }
      35% { transform: translateY(-24px) rotateY(180deg) scale(1.16); }
      70% { transform: translateY(8px) rotateY(300deg) scale(0.93); }
      100% { transform: translateY(0) rotateY(360deg) scale(1); }
    }
    @keyframes glowPulse { 0%,100% { opacity: 0.35; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.15); } }
    @keyframes navIn { from { opacity: 0; transform: translateY(14px) rotateX(-40deg); } to { opacity: 1; transform: translateY(0) rotateX(0deg); } }
    @keyframes panelFlipIn { from { opacity: 0; transform: rotateX(-18deg) translateY(24px) scale(0.96); } to { opacity: 1; transform: rotateX(0deg) translateY(0) scale(1); } }
    @keyframes diceSpin { from { transform: rotateX(0deg) rotateY(0deg); } to { transform: rotateX(360deg) rotateY(300deg); } }
    @keyframes diceSettle { 0% { transform: scale(1.25) rotateY(20deg); } 60% { transform: scale(0.92) rotateY(-6deg); } 100% { transform: scale(1) rotateY(0deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes clockBlink { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    body { margin: 0; }
    a { color: inherit; text-decoration: none; }
    a:hover { color: var(--accent); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; }
  </style>
</helmet>

<div style="position:relative; min-height:100vh; background:{{ colors.bg }}; color:{{ colors.text }}; font-family:'Courier Prime', 'Courier New', monospace; overflow:hidden; transition:background 0.3s ease, color 0.3s ease; --accent:{{ colors.accent }};">

  <div style="position:relative; z-index:1; display:flex; justify-content:center; perspective:1400px; padding:14vh 15px 70px 15px; box-sizing:border-box;">
    <div style="width:100%; max-width:440px; display:flex; flex-direction:column; align-items:center; text-align:center;">

      <!-- HEADER / LOGO -->
      <header style="margin-bottom:110px; display:flex; flex-direction:column; align-items:center;">
        <a href="https://milxn.de" style="display:inline-block; text-decoration:none;">
          <div
            onMouseMove="{{ handleLogoMove }}"
            onMouseLeave="{{ resetTilt }}"
            style="background:#e8221f; border-radius:4px; padding:12px 32px; display:inline-block; box-shadow:0 8px 24px rgba(232,34,31,0.25); transform-style:preserve-3d; perspective:600px; transform:{{ logoTransform }}; transition:transform 0.15s ease-out; cursor:pointer; user-select:none; margin-bottom:14px; animation:floatLogo 4.5s ease-in-out infinite;">
            <span style="color:#ffffff; font-family:'Archivo Black', 'Arial Black', sans-serif; font-size:42px; font-weight:900; font-style:italic; letter-spacing:-0.03em; line-height:1; text-transform:lowercase; display:inline-block;">milxn</span>
          </div>
        </a>
        <div style="font-size:11px; font-weight:700; opacity:0.85; letter-spacing:-0.2px;">{{ clock }}</div>
      </header>

      <!-- MENU -->
      <sc-if value="{{ isMenu }}" hint-placeholder-val="{{ true }}">
        <nav key="{{ viewKey }}" style="width:100%; margin-bottom:70px; animation:panelFlipIn 0.5s cubic-bezier(.2,.8,.2,1) both; transform-style:preserve-3d;">
          <ul style="list-style:none; padding:0; margin:0 auto; width:150px; text-align:left;">
            <li style="margin-bottom:16px;">
              <a href="https://www.linkedin.com/in/milan-swillus-334813371" target="_blank" rel="noopener noreferrer" style="font-size:14px; font-weight:400; text-transform:lowercase; letter-spacing:-0.2px; display:inline-block; position:relative;">linkedin</a>
            </li>
            <li style="margin-bottom:16px;">
              <a href="https://github.com/milanswillus" target="_blank" rel="noopener noreferrer" style="font-size:14px; font-weight:400; text-transform:lowercase; letter-spacing:-0.2px; display:inline-block;">github</a>
            </li>
            <li style="margin-bottom:16px;">
              <a href="#about" onClick="{{ goAbout }}" style="font-size:14px; font-weight:400; text-transform:lowercase; letter-spacing:-0.2px; display:inline-block;">about</a>
            </li>
            <li style="margin-bottom:16px;">
              <a href="https://mil4n.de" target="_blank" rel="noopener noreferrer" style="font-size:14px; font-weight:400; text-transform:lowercase; letter-spacing:-0.2px; display:inline-block;">stickers</a>
            </li>
            <li style="margin-bottom:0;">
              <a href="#" onClick="{{ toggleTheme }}" style="font-size:14px; font-weight:400; text-transform:lowercase; letter-spacing:-0.2px; display:inline-block;">theme: {{ themeLabel }}</a>
            </li>
          </ul>
        </nav>
      </sc-if>

      <!-- ABOUT -->
      <sc-if value="{{ isAbout }}" hint-placeholder-val="{{ false }}">
        <section key="{{ viewKey }}" style="width:100%; margin-bottom:70px; animation:panelFlipIn 0.5s cubic-bezier(.2,.8,.2,1) both; transform-style:preserve-3d;">
          <div style="text-align:left; line-height:1.7; font-size:14px; max-width:380px; margin:0 auto 20px auto;">
            <p style="margin:0 0 12px 0; text-transform:lowercase;">student @hpi</p>
          </div>
          <a href="#menu" onClick="{{ goMenu }}" style="font-size:12px; font-weight:700; text-transform:lowercase; opacity:0.8; display:inline-block;">&lt; back</a>
        </section>
      </sc-if>





      <!-- FOOTER SOCIALS -->
      <footer style="width:100%; margin-top:10px;">
        <div style="display:flex; justify-content:center; gap:18px; align-items:center;">
          <a href="https://www.instagram.com/milan.cpp/" target="_blank" rel="noopener noreferrer" aria-label="Instagram" style="opacity:0.7; display:inline-flex; transition:transform 0.2s ease, opacity 0.15s ease;" style-hover="opacity:1; transform:translateY(-3px) rotateX(10deg); color:{{ colors.accent }};">
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.051.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z" fill="currentColor"/></svg>
          </a>
          <a href="{{ youtubeUrl }}" target="_blank" rel="noopener noreferrer" aria-label="YouTube" style="opacity:0.7; display:inline-flex; transition:transform 0.2s ease, opacity 0.15s ease;" style-hover="opacity:1; transform:translateY(-3px) rotateX(10deg); color:{{ colors.accent }};">
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M23.498 6.163a3.003 3.003 0 00-2.11-2.11C19.518 3.545 12 3.545 12 3.545s-7.518 0-9.388.508a3.003 3.003 0 00-2.11 2.11C0 8.033 0 12 0 12s0 3.967.502 5.837a3.003 3.003 0 002.11 2.11c1.87.508 9.388.508 9.388.508s7.518 0 9.388-.508a3.002 3.002 0 002.11-2.11C24 15.967 24 12 24 12s0-3.967-.502-5.837zM9.545 15.568V8.432L15.818 12l-6.273 3.568z" fill="currentColor"/></svg>
          </a>
          <a href="https://open.spotify.com/user/1pt15okj1966bit3dlucdos3p?si=0451e1d755544cd2" target="_blank" rel="noopener noreferrer" aria-label="Spotify" style="opacity:0.7; display:inline-flex; transition:transform 0.2s ease, opacity 0.15s ease;" style-hover="opacity:1; transform:translateY(-3px) rotateX(10deg); color:{{ colors.accent }};">
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12.008 0C5.375 0 0 5.375 0 12.008c0 6.633 5.375 12.008 12.008 12.008 6.633 0 12.008-5.375 12.008-12.008C24.016 5.375 18.64 0 12.008 0zm5.498 17.322c-.223.367-.706.487-1.073.264-2.985-1.823-6.739-2.235-11.164-1.227-.417.095-.834-.17-.929-.587-.095-.417.17-.834.587-.929 4.846-1.107 8.99-.636 12.316 1.393.367.223.488.706.263 1.086zm1.467-3.262c-.28.455-.878.604-1.333.324-3.414-2.1-8.62-2.712-12.656-1.488-.51.155-1.045-.136-1.2-.646-.155-.51.136-1.046.646-1.2 4.61-1.397 10.354-.716 14.22 1.664.454.28.604.878.323 1.346zm.127-3.398C15.176 8.358 8.7 8.144 4.965 9.277c-.573.173-1.18-.106-1.353-.68-.173-.573.106-1.18.68-1.353 4.29-1.302 11.44-1.056 16.096 1.707.515.306.682.975.377 1.49-.306.514-.975.683-1.49.377z" fill="currentColor"/></svg>
          </a>
        </div>
      </footer>

    </div>
  </div>
</div>



</x-dc>
<script type="text/x-dc" data-dc-script>






/* ---- component ---- */
class Component extends DCLogic {
  state = {
    view: 'menu',
    viewKey: 0,
    theme: 'dark',
    clock: '',
    tiltX: 0,
    tiltY: 0,
    youtubeUrl: 'https://www.youtube.com/watch?v=7wIwJvyZPv0'
  };

  componentDidMount() {
    this._tick();
    this._clockTimer = setInterval(() => this._tick(), 1000);
  }
  componentWillUnmount() {
    clearInterval(this._clockTimer);
  }

  _tick() {
    const now = new Date();
    const month = String(now.getMonth()+1).padStart(2,'0');
    const day = String(now.getDate()).padStart(2,'0');
    const year = now.getFullYear();
    let hours = now.getHours();
    const minutes = String(now.getMinutes()).padStart(2,'0');
    const ampm = hours >= 12 ? 'pm' : 'am';
    hours = hours % 12; hours = hours ? hours : 12;
    const hoursStr = String(hours).padStart(2,'0');
    let timezone = 'BERLIN';
    try {
      const tzName = Intl.DateTimeFormat().resolvedOptions().timeZone;
      if (tzName.includes('Europe/Berlin')) timezone = 'BERLIN';
      else if (tzName.includes('New_York')) timezone = 'NYC';
      else if (tzName.includes('London')) timezone = 'LDN';
      else timezone = tzName.split('/').pop().replace('_',' ').toUpperCase();
    } catch(e) {}
    this.setState({ clock: `${month}/${day}/${year} ${hoursStr}:${minutes}${ampm} ${timezone}` });
  }

  handleLogoMove = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const px = (e.clientX - rect.left) / rect.width - 0.5;
    const py = (e.clientY - rect.top) / rect.height - 0.5;
    this.setState({ tiltX: py * -18, tiltY: px * 22 });
  };
  resetTilt = () => this.setState({ tiltX: 0, tiltY: 0 });



  goMenu = (e) => { e && e.preventDefault(); this.setState(s => ({ view: 'menu', viewKey: s.viewKey + 1 })); };
  goAbout = (e) => { e && e.preventDefault(); this.setState(s => ({ view: 'about', viewKey: s.viewKey + 1 })); };
  toggleTheme = (e) => { e && e.preventDefault(); this.setState(s => ({ theme: s.theme === 'dark' ? 'light' : 'dark' })); };

  renderVals() {
    const s = this.state;
    const dark = s.theme === 'dark';
    
    const colors = {
      bg: dark ? '#000000' : '#ffffff',
      text: dark ? '#ffffff' : '#000000',
      accent: '#e8221f'
    };

    return {
      colors,
      themeLabel: dark ? 'light' : 'dark',
      clock: s.clock,
      logoTransform: `rotateX(${s.tiltX}deg) rotateY(${s.tiltY}deg)`,
      isMenu: s.view === 'menu',
      isAbout: s.view === 'about',
      viewKey: s.viewKey,
      handleLogoMove: this.handleLogoMove,
      resetTilt: this.resetTilt,
      goMenu: this.goMenu, goAbout: this.goAbout,
      toggleTheme: this.toggleTheme,
      youtubeUrl: s.youtubeUrl
    };
  }
}

</script>
</body>
</html>
